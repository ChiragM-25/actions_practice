name: job-artifact

on:
  push:
    branches:
      - main

jobs:
  job1:
    runs-on: ubuntu-latest

    steps: 
      - name: create an artifact
        run: |
          echo "This is a test artifact" > artifact.txt
          mkdir -p artifacts
          mv artifact.txt artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-artifact
          path: artifacts/
    
  job2:
    runs-on: ubuntu-latest
    needs: job1

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: test-artifact
          path: ./artifact

      - name: Display artifact
        run: |
          ls -lrt ./artifact
          cat ./artifact/artifact.txt