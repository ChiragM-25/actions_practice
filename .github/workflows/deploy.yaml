name: Docker CI/CD Pipeline

on:
  workflow_dispatch:

  push:
    branches:
      - main

############################################################
# Global Variables
############################################################

env:
  AWS_REGION: ap-south-1
  ACCOUNT_ID: 464505731561
  ECR_REPOSITORY: actions-demo

############################################################
# Jobs
############################################################

jobs:

############################################################
# BUILD
############################################################

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

############################################################
# UNIT TEST
############################################################

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest

    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: Run Unit Tests
        run: |
          echo "All tests passed"

############################################################
# LINT
############################################################

  lint:
    name: Lint
    runs-on: ubuntu-latest

    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: Run Lint
        run: |
          echo "Lint successful"

############################################################
# DOCKER BUILD & PUSH
############################################################

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    needs:
      - unit-test
      - lint

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Image URI
        id: image
        run: |
          IMAGE_URI=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA}

          echo "Image URI: $IMAGE_URI"

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ steps.image.outputs.image_uri }} .

      - name: Push Docker Image
        run: |
          docker push ${{ steps.image.outputs.image_uri }}

############################################################
# DEPLOY
############################################################

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    needs: docker

    env:
      APP_NAME: devops-demo
      APP_ENV: development
      HOST_PORT: 3000
      CONTAINER_PORT: 3000

    steps:

      - name: Deploy Application
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            ACCOUNT_ID="${{ env.ACCOUNT_ID }}"
            AWS_REGION="${{ env.AWS_REGION }}"
            APP_NAME="${{ env.APP_NAME }}"
            HOST_PORT="${{ env.HOST_PORT }}"
            CONTAINER_PORT="${{ env.CONTAINER_PORT }}"
            IMAGE_URI="${{ needs.docker.outputs.image_uri }}"

            echo "==========================================="
            echo "Deploying DevOps Demo Application"
            echo "==========================================="
            echo "Image        : $IMAGE_URI"
            echo "Commit       : ${{ github.sha }}"
            echo "Branch       : ${{ github.ref_name }}"
            echo "Workflow Run : ${{ github.run_number }}"
            echo "==========================================="

            aws ecr get-login-password --region $AWS_REGION | \
            docker login \
              --username AWS \
              --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

            echo "Pulling latest image..."
            docker pull $IMAGE_URI

            echo "Stopping old container..."
            docker stop $APP_NAME || true

            echo "Removing old container..."
            docker rm $APP_NAME || true

            echo "Starting new container..."

            docker run -d \
              --name $APP_NAME \
              -p ${HOST_PORT}:${CONTAINER_PORT} \
              -e APP_ENV="${{ env.APP_ENV }}" \
              -e APP_VERSION="${{ github.run_number }}" \
              -e GIT_COMMIT="${{ github.sha }}" \
              -e GIT_BRANCH="${{ github.ref_name }}" \
              -e WORKFLOW_RUN="${{ github.run_number }}" \
              -e BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
              $IMAGE_URI

            echo "Cleaning unused images..."
            docker image prune -af

            echo "==========================================="
            echo "Deployment Completed"
            echo "==========================================="