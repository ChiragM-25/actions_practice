name: Deploy Docker App

on:
  workflow_dispatch:
    
  push:
    branches:
      - main
 
  schedule:
    - cron: '0 14-18 * * 1-5' # Runs every hour from 2 PM to 6 PM, Monday to Friday
    
env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: actions-demo
  ACCOUNT_ID: 464505731561

jobs:
  
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
  
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
  
      - name: Install Dependencies
        run: npm ci  

  unit-test:
    runs-on: ubuntu-latest
  
    needs: build
  
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/setup-node@v4
        with:
          node-version: 22
  
      - run: npm ci
  
      - name: Run Tests
        run: |
          echo "No tests yet"
  
  lint:
    runs-on: ubuntu-latest
  
    needs: build
  
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/setup-node@v4
        with:
          node-version: 22
  
      - run: npm ci
  
      - name: Lint
        run: |
          echo "Lint passed"
  
  Docker:
    runs-on: ubuntu-latest

    needs: 
      - unit-test
      - lint

    outputs:
      image_tag: ${{ github.sha }}

    steps:

      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
          -t $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.sha }}

  deploy:

    runs-on: ubuntu-latest

    needs: Docker

    steps:

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            aws ecr get-login-password --region ap-south-1 | \
            docker login --username AWS \
            --password-stdin 464505731561.dkr.ecr.ap-south-1.amazonaws.com

            docker pull \
            464505731561.dkr.ecr.ap-south-1.amazonaws.com/actions-demo:${{ github.sha }}

            docker stop actions-demo || true

            docker rm actions-demo || true

            docker run -d \
              --name actions-demo \
              -p 3000:3000 \
              464505731561.dkr.ecr.ap-south-1.amazonaws.com/actions-demo:${{ github.sha }}