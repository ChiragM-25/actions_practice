name: Docker CI/CD Pipeline

on:
  workflow_dispatch:

  # push:
  #   branches:
  #     - main

env:
  AWS_REGION: ap-south-1
  ACCOUNT_ID: 464505731561
  ECR_REPOSITORY: actions-demo

jobs:

  ############################################################
  # BUILD
  ############################################################

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-node

  ############################################################
  # UNIT TEST
  ############################################################

  unit-test:
    runs-on: ubuntu-latest

    needs: build

    steps:
      - uses: ./.github/actions/setup-node
    
      - name: Run Tests
        run: |
          echo "No tests yet"

  ############################################################
  # LINT
  ############################################################

  lint:
    runs-on: ubuntu-latest

    needs: build

    steps:
      - uses: ./.github/actions/setup-node
    
      - name: Lint
        run: |
          echo "Lint passed"

  ############################################################
  # DOCKER BUILD & PUSH
  ############################################################

  docker:
    runs-on: ubuntu-latest

    needs:
      - unit-test
      - lint

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Image URI
        id: image
        run: |
          IMAGE_URI=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA}

          echo "IMAGE_URI=$IMAGE_URI"

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ steps.image.outputs.image_uri }} .

      - name: Push Docker Image
        run: |
          docker push \
          ${{ steps.image.outputs.image_uri }}

  #############################################################
  # DEPLOY
  #############################################################

  deploy:
    runs-on: ubuntu-latest

    needs: docker

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            aws ecr get-login-password --region ${AWS_REGION} | \
            docker login \
            --username AWS \
            --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

            docker pull \
            ${{ needs.docker.outputs.image_uri }}

            docker stop actions-demo || true

            docker rm actions-demo || true

            docker run -d \
              --name actions-demo \
              -p 3000:3000 \
              ${{ needs.docker.outputs.image_uri }}

            docker image prune -f