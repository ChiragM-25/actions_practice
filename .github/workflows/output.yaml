name: Job Output Demo

on:
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest

    outputs:
      message: ${{ steps.step2.outputs.message }}

    steps:
      - name: Create Output
        id: step1
        run: echo "msg=Hello from Step1" >> $GITHUB_OUTPUT

      - name: Get Output from Step1
        run: echo "The output from step1 ====> ${{ steps.step1.outputs.msg }}"

      - name: Create Output for Job2
        id: step2
        run: echo "message=Hello from Job1" >> $GITHUB_OUTPUT

  job2:
    runs-on: ubuntu-latest
    needs: job1

    steps:
      - name: Print Output from Job1
        run: echo "The output from job1 ====> ${{ needs.job1.outputs.message }}"