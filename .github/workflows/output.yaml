name: Job Output

on:
  workflow_dispatch:

jobs:
  generate-version:
    runs-on: ubuntu-latest

    outputs:
      app_version: ${{ steps.version.outputs.app_version }}

    steps:
      - name: Generate Version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Print Version
        run: echo "Generated Version = ${{ steps.version.outputs.app_version }}"

  deploy:
    runs-on: ubuntu-latest
    needs: generate-version

    steps:
      - name: Use Output From Previous Job
        run: |
          echo "Deploying version ${{ needs.generate-version.outputs.app_version }}"