name: Job Output Demo

on:
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest

    outputs:
      message: ${{ steps.step1.outputs.msg }}

    steps:
      - name: Create Output
        id: step1
        run: echo "msg=Hello World" >> $GITHUB_OUTPUT

  job2:
    runs-on: ubuntu-latest
    needs: job1

    steps:
      - name: Print Output
        run: echo "${{ needs.job1.outputs.message }}"